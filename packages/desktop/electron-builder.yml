appId: com.phonebridge.desktop
productName: PhoneBridge
copyright: Copyright © 2025 PhoneBridge

npmRebuild: false

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.png
    to: icon.png
  - from: resources/vbcable
    to: vbcable
    filter:
      - "VBCABLE_Setup_x64.exe"
      - "VBCABLE_Setup.exe"
      - "VBCABLE_ControlPanel.exe"
      - "readme.txt"

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: [x64]
  artifactName: PhoneBridge-Setup-${version}.exe
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PhoneBridge
  deleteAppDataOnUninstall: false

portable:
  artifactName: PhoneBridge-Portable-${version}.exe
